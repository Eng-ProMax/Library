<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="paper" data-lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مكتبة إمام المتقين | Imam Al-Muttaqin Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;500;700&family=Lora:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

<style>
  :root{
    --radius: 14px;
  }
  html[data-theme="paper"]{
    --bg:#F6EFDD; --bg-elevated:#FFFDF6; --text:#2B2113; --muted:#8C7B5E;
    --accent:#0F5C4E; --accent-2:#B9902E; --accent-soft:#E6E0C8; --border:#E3D6B4; --shadow: 0 10px 30px rgba(60,40,10,0.10);
  }
  html[data-theme="sepia"]{
    --bg:#EFE0BE; --bg-elevated:#F7EED2; --text:#4A3826; --muted:#8a7455;
    --accent:#8C5A2B; --accent-2:#6E3B2E; --accent-soft:#e6cf9e; --border:#DEC98F; --shadow: 0 10px 30px rgba(80,55,20,0.14);
  }
  html[data-theme="night"]{
    --bg:#11141B; --bg-elevated:#1A1D29; --text:#EDE7D6; --muted:#9b95a6;
    --accent:#D4AF37; --accent-2:#4C9A8C; --accent-soft:#2a2717; --border:#2A2D3D; --shadow: 0 10px 30px rgba(0,0,0,0.45);
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--bg); color:var(--text); transition:background .25s, color .25s;}
  html[data-lang="ar"] body{font-family:'Tajawal', sans-serif;}
  html[data-lang="en"] body{font-family:'Inter', sans-serif;}
  html[data-lang="ar"] .display{font-family:'Amiri', serif;}
  html[data-lang="en"] .display{font-family:'Lora', serif;}

  #app{min-height:100vh; display:flex; flex-direction:column;}

  .ribbon{
    height:10px; width:100%;
    background:
      repeating-linear-gradient(135deg, var(--accent) 0 6px, transparent 6px 12px),
      repeating-linear-gradient(45deg, var(--accent-2) 0 6px, transparent 6px 12px);
    background-size:12px 12px, 12px 12px;
    background-position:0 0, 6px 0;
    opacity:.9;
  }
  .ribbon.thin{height:4px;}

  .topbar{
    display:flex; align-items:center; justify-content:space-between; padding:14px 18px;
    background:var(--bg-elevated); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:20;
  }
  .brand{display:flex; align-items:center; gap:10px;}
  .brand-mark{width:36px; height:36px; border-radius:9px; background:linear-gradient(160deg, var(--accent), var(--accent-2)); color:var(--bg-elevated); display:flex; align-items:center; justify-content:center; font-size:16px;}
  .brand-name{font-size:17px; font-weight:700;}
  .top-controls{display:flex; align-items:center; gap:8px;}
  .icon-btn{
    width:38px; height:38px; border-radius:50%; border:1px solid var(--border); background:var(--bg-elevated);
    color:var(--text); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:15px;
  }
  select.theme-select{
    border:1px solid var(--border); background:var(--bg-elevated); color:var(--text); border-radius:20px;
    padding:6px 10px; font-size:12px; font-family:inherit; cursor:pointer;
  }
  .avatar-btn{
    width:38px; height:38px; border-radius:50%; background:linear-gradient(160deg, var(--accent), var(--accent-2)); color:var(--bg-elevated); border:none;
    font-weight:700; cursor:pointer; font-size:14px;
  }

  main{flex:1; padding:18px 18px 90px; max-width:920px; margin:0 auto; width:100%;}
  .tab-panel[hidden]{display:none;}

  .section-head{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:6px;}
  .section-head h2{margin:0; font-size:20px;}
  .muted-line{color:var(--muted); font-size:13px; margin:10px 0 16px;}

  .grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(150px,1fr)); gap:14px;}
  .book-card{
    background:var(--bg-elevated); border:1px solid var(--border); border-radius:12px; padding:14px;
    cursor:pointer; position:relative; overflow:hidden; transition:transform .15s, box-shadow .15s;
  }
  .book-card:hover{transform:translateY(-3px); box-shadow:var(--shadow);}
  .book-card::before{content:""; position:absolute; inset-inline-start:0; top:0; bottom:0; width:5px; background:var(--cat-color, var(--accent));}
  .book-title{font-weight:700; font-size:15px; margin:4px 0 3px; line-height:1.4;}
  .book-author{color:var(--muted); font-size:12.5px; margin:0 0 8px;}
  .book-tag{display:inline-block; font-size:11px; padding:3px 9px; border-radius:20px; background:var(--accent-soft); color:var(--text);}
  .fav-mark{position:absolute; inset-inline-end:10px; top:10px; font-size:15px;}
  .skeleton{background:linear-gradient(90deg, var(--accent-soft) 25%, var(--border) 37%, var(--accent-soft) 63%); background-size:400% 100%; animation:shimmer 1.4s ease infinite; border-radius:12px; height:96px;}
  @keyframes shimmer{0%{background-position:100% 0;}100%{background-position:-100% 0;}}

  .empty-state{grid-column:1/-1; text-align:center; padding:48px 20px; color:var(--muted);}
  .empty-state .ee-icon{font-size:34px; margin-bottom:10px;}
  .empty-state p{margin:0; font-size:13.5px; line-height:1.8;}

  .adhkar-list{display:flex; flex-direction:column; gap:16px;}
  .adhkar-card{
    background:var(--bg-elevated); border:1px solid var(--border); border-radius:16px; padding:26px 22px;
    text-align:center; position:relative;
  }
  .adhkar-card .orn-line{color:var(--accent-2); font-size:19px; letter-spacing:8px; margin-bottom:16px;}
  .adhkar-card .orn-line.bottom{margin-bottom:0; margin-top:16px;}
  .adhkar-card .adhkar-text{font-family:'Amiri', serif; font-size:17.5px; line-height:2.4; color:var(--text);}
  .adhkar-card .adhkar-source{color:var(--accent); font-size:12.5px; font-weight:700; margin-top:14px;}

  .search-box{display:flex; gap:8px; margin-bottom:16px;}
  .search-box input{
    flex:1; padding:12px 16px; border-radius:12px; border:1px solid var(--border); background:var(--bg-elevated);
    color:var(--text); font-family:inherit; font-size:14px;
  }
  .chips{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:18px;}
  .chip{
    padding:7px 14px; border-radius:20px; border:1px solid var(--border); background:var(--bg-elevated);
    color:var(--text); font-size:13px; cursor:pointer; font-family:inherit;
  }
  .chip.active{background:var(--accent); color:var(--bg-elevated); border-color:var(--accent);}

  .bottom-nav{
    position:fixed; bottom:0; inset-inline:0; background:var(--bg-elevated); border-top:1px solid var(--border);
    display:flex; z-index:20;
  }
  .nav-btn{
    flex:1; border:none; background:none; padding:12px 0 10px; color:var(--muted); cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:3px; font-size:11px; font-family:inherit;
  }
  .nav-btn.active{color:var(--accent); font-weight:700;}
  .nav-icon{font-size:18px;}

  .drawer-overlay{position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:30;}
  .drawer-overlay[hidden]{display:none;}
  .drawer{
    position:fixed; top:0; bottom:0; width:min(85vw, 340px); background:var(--bg-elevated); z-index:31;
    box-shadow:var(--shadow); padding:22px; overflow-y:auto;
  }
  .drawer[hidden]{display:none;}
  html[dir="rtl"] .drawer{right:0; border-inline-start:1px solid var(--border);}
  html[dir="ltr"] .drawer{left:0; border-inline-end:1px solid var(--border);}
  .drawer-profile{display:flex; align-items:center; gap:12px; margin-bottom:22px;}
  .drawer-avatar{width:52px; height:52px; border-radius:50%; background:linear-gradient(160deg, var(--accent), var(--accent-2)); color:var(--bg-elevated); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:18px;}
  .drawer-name{font-weight:700; font-size:16px;}
  .drawer-sub{color:var(--muted); font-size:12px;}
  .drawer-tabs{display:flex; gap:6px; margin-bottom:14px; background:var(--bg); border-radius:10px; padding:4px;}
  .drawer-tab-btn{flex:1; border:none; background:none; padding:8px; border-radius:8px; cursor:pointer; font-size:13px; color:var(--muted); font-family:inherit;}
  .drawer-tab-btn.active{background:var(--bg-elevated); color:var(--text); font-weight:700; box-shadow:0 1px 4px rgba(0,0,0,.08);}
  .drawer-list-item{display:flex; justify-content:space-between; gap:8px; padding:10px 0; border-bottom:1px solid var(--border); font-size:13.5px;}
  .drawer-empty{color:var(--muted); font-size:13px; text-align:center; padding:26px 0;}
  .drawer-section{margin-top:22px; padding-top:14px; border-top:1px solid var(--border);}
  .drawer-section h4{margin:0 0 10px; font-size:13px; color:var(--muted); font-weight:700;}
  .btn{
    width:100%; padding:12px 16px; border-radius:10px; border:1px solid var(--border); background:var(--bg-elevated);
    color:var(--text); font-size:15px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px;
    margin-bottom:10px; font-family:inherit; transition:transform .12s, background .2s;
  }
  .btn:hover{transform:translateY(-1px); background:var(--accent-soft);}
  .btn.primary{background:linear-gradient(160deg, var(--accent), var(--accent-2)); color:var(--bg-elevated); border-color:transparent; font-weight:700;}
  .btn.primary:hover{filter:brightness(1.06);}
  .btn:disabled{opacity:.6; cursor:default; transform:none;}
  .danger-btn{width:100%; margin-top:20px; padding:10px; border-radius:10px; border:1px solid var(--border); background:none; color:#B94A3A; cursor:pointer; font-family:inherit; font-weight:600;}
  .close-drawer{float:inline-end; border:none; background:none; font-size:18px; cursor:pointer; color:var(--muted);}

  .modal-overlay{position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:40; display:flex; align-items:center; justify-content:center; padding:20px;}
  .modal-overlay[hidden]{display:none;}
  .modal{background:var(--bg-elevated); border-radius:18px; max-width:420px; width:100%; padding:26px; position:relative; box-shadow:var(--shadow); max-height:88vh; overflow-y:auto;}
  .modal-close{position:absolute; inset-inline-end:16px; top:14px; border:none; background:none; font-size:18px; cursor:pointer; color:var(--muted);}
  .modal-cover{height:80px; border-radius:10px; margin-bottom:16px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:26px;}
  .modal h3{margin:0 0 4px;}
  .modal .modal-author{color:var(--muted); font-size:13px; margin:0 0 14px;}
  .modal .modal-desc{font-size:13.5px; line-height:1.8; margin-bottom:20px;}
  .modal-actions{display:flex; flex-direction:column; gap:8px;}
  .modal-actions .btn{margin-bottom:0;}
  .rating-row{display:flex; align-items:center; justify-content:center; gap:4px; margin:4px 0 18px;}
  .rating-row .star{font-size:24px; color:var(--border);}
  .rating-row .star.filled{color:var(--accent-2);}
  .rating-row .rating-summary{color:var(--muted); font-size:12px; margin-inline-start:8px;}

  /* ---------- نافذة تحميل الكتاب المسبق ---------- */
  .download-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 60;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .download-card {
    background: var(--bg-elevated); padding: 30px; border-radius: 18px;
    text-align: center; max-width: 350px; width: 100%; box-shadow: var(--shadow);
  }
  .progress-bar-container {
    background: var(--border); height: 8px; width: 100%; border-radius: 4px;
    margin: 20px 0 10px; overflow: hidden;
  }
  .progress-bar {
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    height: 100%; width: 0%; transition: width 0.1s ease;
  }

  /* ---------- قارئ بتمرير عمودي متصل + تكبير/تصغير + رسم وهايلايت ---------- */
  .reader-overlay{position:fixed; inset:0; background:var(--bg); z-index:50; display:flex; flex-direction:column;}
  .reader-overlay[hidden]{display:none;}
  .reader-topbar{background:var(--bg-elevated); border-bottom:1px solid var(--border); padding:10px 14px;
    display:flex; align-items:center; justify-content:space-between; gap:10px; flex-shrink:0; flex-wrap:wrap;}
  .reader-topbar .rt-side{font-size:13px; color:var(--text); font-weight:600; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-width:60px;}
  .reader-topbar .rt-center{font-weight:600; font-size:12.5px; color:var(--muted); white-space:nowrap;}
  .reader-back{border:none; background:none; font-size:16px; color:var(--text); cursor:pointer; padding:0 4px;}

  .reader-tools-group{display:flex; align-items:center; gap:4px;}
  .reader-tool-btn{
    border:1px solid var(--border); background:var(--bg-elevated); color:var(--text); cursor:pointer;
    width:32px; height:32px; border-radius:8px; font-size:14px; display:flex; align-items:center; justify-content:center; font-family:inherit;
  }
  .reader-tool-btn.active{background:var(--accent); color:var(--bg-elevated); border-color:var(--accent);}
  .zoom-label{font-size:11.5px; color:var(--muted); min-width:38px; text-align:center;}

  .draw-toolbar{
    background:var(--bg-elevated); border-bottom:1px solid var(--border); padding:10px 14px;
    display:flex; align-items:center; gap:8px; flex-wrap:wrap; flex-shrink:0;
  }
  .draw-toolbar[hidden]{display:none;}
  .draw-tool-chip{
    border:1px solid var(--border); background:var(--bg); color:var(--text); border-radius:20px;
    padding:6px 12px; font-size:12.5px; cursor:pointer; font-family:inherit; display:flex; align-items:center; gap:5px;
  }
  .draw-tool-chip.active{background:var(--accent); color:var(--bg-elevated); border-color:var(--accent);}
  .draw-toolbar input[type="color"]{
    width:32px; height:32px; padding:0; border:1px solid var(--border); border-radius:8px; background:none; cursor:pointer;
  }
  .draw-toolbar input[type="range"]{width:90px; accent-color:var(--accent);}
  .draw-size-label{font-size:11px; color:var(--muted); white-space:nowrap;}

  .reader-canvas-wrap{flex:1; overflow-y:auto; overflow-x:hidden; padding:20px 10px 90px; scroll-behavior: smooth;}
  .reader-pages-container { display:flex; flex-direction:column; gap:20px; align-items:center; width:100%; }

  .page-container {
    box-shadow: 0 5px 20px rgba(0,0,0,0.15); border-radius: 6px; 
    background: #fff; overflow: hidden; position: relative; max-width: 100%; flex-shrink:0;
  }
  .page-container canvas.pdf-canvas { display: block; max-width: 100%; height: auto !important; }
  .page-container canvas.draw-canvas{
    position:absolute; inset:0; width:100%; height:100%; pointer-events:none; touch-action:auto;
  }

  .reader-bottom-nav{
    display:flex; background:var(--bg-elevated); border-top:1px solid var(--border); flex-shrink:0; z-index:25;
  }
  .reader-bottom-btn{
    flex:1; border:none; background:none; padding:10px 4px 8px; color:var(--muted); cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:4px; font-size:11px; font-family:inherit;
  }
  .reader-bottom-btn.active{color:var(--accent); font-weight:700;}
  .reader-bottom-icon{font-size:18px;}

  .reader-panel-overlay{position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:55;}
  .reader-panel-overlay[hidden]{display:none;}
  .reader-panel{
    position:fixed; bottom:0; inset-inline:0; max-height:70vh; background:var(--bg-elevated); z-index:56;
    border-radius:16px 16px 0 0; box-shadow:var(--shadow); padding:18px; overflow-y:auto;
  }
  .reader-panel[hidden]{display:none;}
  .reader-panel h4{margin:0 0 14px; font-size:15px; display:flex; align-items:center; justify-content:space-between;}
  .reader-panel .close-panel{border:none; background:none; font-size:18px; cursor:pointer; color:var(--muted);}
  .index-grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(52px,1fr)); gap:8px;}
  .index-page-btn{
    border:1px solid var(--border); background:var(--bg); color:var(--text); border-radius:8px; padding:8px 0;
    cursor:pointer; font-family:inherit; font-size:13px;
  }
  .index-page-btn:hover{background:var(--accent-soft);}
  .reader-search-row{display:flex; gap:8px; margin-bottom:10px;}
  .reader-search-row input{
    flex:1; padding:10px 14px; border-radius:10px; border:1px solid var(--border); background:var(--bg);
    color:var(--text); font-family:inherit; font-size:14px;
  }
  .reader-search-row button{
    padding:0 16px; border-radius:10px; border:none; background:var(--accent); color:var(--bg-elevated);
    cursor:pointer; font-family:inherit; font-weight:700;
  }
  .bookmark-empty{color:var(--muted); font-size:13px; text-align:center; padding:20px 0;}

  .toast{position:fixed; bottom:96px; left:50%; transform:translateX(-50%); background:var(--text); color:var(--bg);
    padding:10px 20px; border-radius:20px; font-size:13px; z-index:80; opacity:0; pointer-events:none; transition:opacity .25s; white-space:nowrap;}
  .toast.show{opacity:1;}

  ::selection{background:var(--accent); color:var(--bg-elevated);}
  [hidden]{display:none !important;}
</style>
</head>
<body>
<div class="ribbon"></div>
<div id="app">

  <!-- MAIN APP (يفتح مباشرة بدون تسجيل دخول) -->
  <div id="mainApp">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">📚</div>
        <div class="brand-name display" data-t="appName">مكتبة إمام المتقين</div>
      </div>
      <div class="top-controls">
        <select class="theme-select" id="themeSelect" onchange="setTheme(this.value)">
          <option value="paper" data-t="themePaper">فاتح</option>
          <option value="sepia" data-t="themeSepia">ورقي</option>
          <option value="night" data-t="themeNight">داكن</option>
        </select>
        <button class="icon-btn" onclick="toggleLang()" id="langBtn">EN</button>
        <button class="avatar-btn" id="avatarBtn" onclick="openDrawer()">👤</button>
      </div>
    </header>

    <main>
      <!-- HOME TAB -->
      <section class="tab-panel" id="homeTab">
        <div class="section-head">
          <h2 class="display" data-t="homeTitle">اختيارات لك اليوم</h2>
        </div>
        <div class="ribbon thin"></div>
        <div class="grid" id="homeGrid" style="margin-top:16px;"></div>
      </section>

      <!-- SEARCH TAB -->
      <section class="tab-panel" id="searchTab" hidden>
        <div class="section-head">
          <h2 class="display" data-t="searchTitle">البحث في المكتبة</h2>
        </div>
        <div class="ribbon thin"></div>
        <div class="search-box" style="margin-top:16px;">
          <input type="text" id="searchInput" data-t-ph="searchPlaceholder" placeholder="ابحث عن كتاب أو مؤلف..." oninput="renderSearch()">
        </div>
        <p class="muted-line" data-t="categoriesLabel" style="margin-top:0;">التصنيفات</p>
        <div class="chips" id="categoryChips"></div>
        <div class="grid" id="searchGrid"></div>
      </section>

      <!-- ADHKAR TAB -->
      <section class="tab-panel" id="adhkarTab" hidden>
        <div class="section-head">
          <h2 class="display" data-t="adhkarTitle">أذكار أهل البيت</h2>
        </div>
        <div class="ribbon thin"></div>
        <p class="muted-line" data-t="adhkarSub">أذكار وأدعية مختارة، تُضاف من لوحة تحكم المدير</p>
        <div class="adhkar-list" id="adhkarList"></div>
      </section>
    </main>

    <nav class="bottom-nav">
      <button class="nav-btn active" id="navHome" onclick="switchTab('home')">
        <span class="nav-icon">🏠</span><span data-t="navHome">الرئيسية</span>
      </button>
      <button class="nav-btn" id="navSearch" onclick="switchTab('search')">
        <span class="nav-icon">🔎</span><span data-t="navSearch">البحث</span>
      </button>
      <button class="nav-btn" id="navAdhkar" onclick="switchTab('adhkar')">
        <span class="nav-icon">📿</span><span data-t="navAdhkar">الأذكار</span>
      </button>
    </nav>

    <!-- DRAWER (Profile) -->
    <div class="drawer-overlay" id="drawerOverlay" hidden onclick="closeDrawer()"></div>
    <aside class="drawer" id="profileDrawer" hidden>
      <button class="close-drawer" onclick="closeDrawer()">✕</button>
      <div class="drawer-profile">
        <div class="drawer-avatar" id="drawerAvatar">👤</div>
        <div>
          <div class="drawer-name" id="drawerName">—</div>
          <div class="drawer-sub" id="drawerSub">—</div>
        </div>
      </div>
      <div class="drawer-tabs">
        <button class="drawer-tab-btn active" id="tabFav" onclick="switchDrawerTab('fav')" data-t="favoritesTab">المفضلة</button>
        <button class="drawer-tab-btn" id="tabHist" onclick="switchDrawerTab('hist')" data-t="historyTab">سجل القراءة</button>
      </div>
      <div id="drawerListContainer"></div>

      <div class="drawer-section">
        <h4 data-t="settingsLabel">الإعدادات</h4>
        <button class="btn" onclick="toggleLang()"><span data-t="switchLangBtn">التبديل إلى English</span></button>

<script>
/* =========================================================================
   إعدادات الاتصال بـ Supabase (تُستخدم فقط لجلب الكتب/الأذكار العامة، لا حسابات مستخدمين)
   ========================================================================= */
const SUPABASE_URL = 'https://nshuwvmaidlagypifyde.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_nUbqTqIfATYfIZSPC8auFg_5ubR5cJ6';

const CONFIGURED = SUPABASE_URL.startsWith('http') && SUPABASE_ANON_KEY.length > 20;
let supabaseClient = null;
if(CONFIGURED){
  supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: {
      persistSession: true,      // الافتراضي: يبقي المستخدم مسجلاً بعد إغلاق الصفحة
      autoRefreshToken: true,    // يجدد الجلسة تلقائيًا قبل انتهائها
      detectSessionInUrl: true   // يلتقط الجلسة من الرابط بعد تسجيل الدخول عبر Google
    }
  });
}

const CATEGORIES = [
  {key:'literature', ar:'الأدب', en:'Literature', color:'#0F5C4E'},
  {key:'religion',   ar:'الدين', en:'Religion',   color:'#B9902E'},
  {key:'history',    ar:'التاريخ', en:'History',   color:'#7B2D26'},
  {key:'spelling',   ar:'الإملاء', en:'Spelling', color:'#4C6B8A'},
  {key:'morphology', ar:'الصرف', en:'Morphology', color:'#6B4C6B'},
  {key: 'language', ar: 'اللغة', en: 'Language', color: '#6A5ACD'},
  {key: 'curricula', ar:'المناهج الدراسية', en:'Curricula', color:'#FF9F43'},
];

let BOOKS = [];
let ADHKAR = [];
let RATINGS = [];

const I18N = {
  ar:{
    appName:'مكتبة إمام المتقين',
    themePaper:'فاتح', themeSepia:'ورقي', themeNight:'داكن',
    homeTitle:'اختيارات لك اليوم',
    searchTitle:'البحث في المكتبة', searchPlaceholder:'ابحث عن كتاب أو مؤلف...', categoriesLabel:'التصنيفات',
    navHome:'الرئيسية', navSearch:'البحث', navAdhkar:'الأذكار',
    adhkarTitle:'أذكار أهل البيت', adhkarSub:'أذكار وأدعية مختارة، تُضاف من لوحة تحكم المدير',
    emptyAdhkar:'أذكار أهل البيت فارغة حاليًا',
    favoritesTab:'المفضلة', historyTab:'سجل القراءة', settingsLabel:'الإعدادات',
    switchLangBtn:'التبديل إلى English', resetDataBtn:'مسح كل البيانات المحفوظة على هذا الجهاز',
    by:'تأليف', addFav:'➕ أضف إلى المفضلة', removeFav:'✓ في المفضلة', markRead:'📖 وضع علامة مقروء', markedRead:'✓ تمت قراءته',
    noResults:'لا توجد نتائج مطابقة', visitorName:'زائر', visitorSub:'بياناتك محفوظة تلقائيًا على هذا الجهاز',
    readBtn:'📖 قراءة الكتاب', noPdfMsg:'لم تتم إضافة نسخة القراءة لهذا الكتاب بعد',
    emptyLibrary:'المكتبة فارغة حاليًا', emptyLibraryDesc:'أضف كتبًا من لوحة تحكم المدير لتظهر هنا فورًا لجميع المستخدمين.',
    loading:'جارِ التحميل واستخراج الصفحات...', pdfLoadError:'تعذّر تحميل الكتاب، تحقق من اتصالك بالإنترنت',
    pageOf:(n,total)=>`صفحة ${n} من ${total}`,
    drawSizeLabel:'الحجم',
    confirmReset:'سيتم حذف المفضلة وسجل القراءة والرسومات المحفوظة على هذا الجهاز بشكل نهائي. متابعة؟',
    saveBookmarkBtn:'حفظ علامة', goBookmarkBtn:'انتقال الى العلامة', indexBtn:'الفهرس', readerSearchBtn:'بحث', lightBtn:'الاضاءة',
    readerSearchPh:'رقم الصفحة', goBtn:'انتقال',
    bookmarkSaved:'تم حفظ العلامة', bookmarkNone:'لا توجد علامة محفوظة لهذا الكتاب', pageNotFound:'رقم الصفحة غير موجود',
  },
  en:{
    appName:'Imam Al-Muttaqin Library',
    themePaper:'Light', themeSepia:'Sepia', themeNight:'Dark',
    homeTitle:'Picked for you today',
    searchTitle:'Search the library', searchPlaceholder:'Search for a book or author...', categoriesLabel:'Categories',
    navHome:'Home', navSearch:'Search', navAdhkar:'Adhkar',
    adhkarTitle:'Ahlul Bayt Adhkar', adhkarSub:'Selected supplications and remembrances, added from the admin dashboard',
    emptyAdhkar:'No adhkar added yet',
    favoritesTab:'Favorites', historyTab:'Reading history', settingsLabel:'Settings',
    switchLangBtn:'Switch to العربية', resetDataBtn:'Clear all data saved on this device',
    by:'by', addFav:'➕ Add to favorites', removeFav:'✓ In favorites', markRead:'📖 Mark as read', markedRead:'✓ Read',
    noResults:'No matching results', visitorName:'Visitor', visitorSub:'Your data is saved automatically on this device',
    readBtn:'📖 Read book', noPdfMsg:'This book has no reading copy uploaded yet',
    emptyLibrary:'The library is empty right now', emptyLibraryDesc:'Add books from the admin dashboard and they will appear here instantly for every user.',
    loading:'Loading & rendering pages...', pdfLoadError:'Could not load the book, check your connection',
    pageOf:(n,total)=>`Page ${n} of ${total}`,
    drawSizeLabel:'Size',
    confirmReset:'This will permanently delete favorites, reading history, and drawings saved on this device. Continue?',
    saveBookmarkBtn:'Save bookmark', goBookmarkBtn:'Go to bookmark', indexBtn:'Index', readerSearchBtn:'Search', lightBtn:'Lighting',
    readerSearchPh:'Page number', goBtn:'Go',
    bookmarkSaved:'Bookmark saved', bookmarkNone:'No bookmark saved for this book', pageNotFound:'Page number not found',
  }
};

let state = {
  lang:'ar', theme:'paper',
  user:{ name:'', sub:'' },
  favorites:new Set(), history:new Set(),
  activeTab:'home', drawerTab:'fav', selectedCategory:null,
  booksLoaded:false, currentPdfBookId:null
};

function catInfo(key){ return CATEGORIES.find(c=>c.key===key) || {ar:key, en:key, color:'#0F5C4E'}; }
function t(key){ return I18N[state.lang][key] || key; }

/* ============== تخزين محلي دائم على الجهاز (بدون أي حساب) ============== */
const LOCAL_KEY = 'imamLibrary_localData';
function loadLocalData(){
  try{
    const d = JSON.parse(localStorage.getItem(LOCAL_KEY));
    return d || { favorites:[], history:[], positions:{}, drawings:{} };
  }catch(e){ return { favorites:[], history:[], positions:{}, drawings:{} }; }
}
function saveLocalData(data){
  try{ localStorage.setItem(LOCAL_KEY, JSON.stringify(data)); }catch(e){}
}
function getSavedDrawing(bookId, pageNum){
  const d = loadLocalData();
  return (d.drawings[bookId] && d.drawings[bookId][pageNum]) || null;
}
function saveDrawingForPage(bookId, pageNum, canvas){
  const d = loadLocalData();
  if(!d.drawings[bookId]) d.drawings[bookId] = {};
  d.drawings[bookId][pageNum] = canvas.toDataURL('image/png');
  saveLocalData(d);
}
function resetLocalData(){
  if(!confirm(t('confirmReset'))) return;
  localStorage.removeItem(LOCAL_KEY);
  location.reload();
}

/* ============== بدء التطبيق مباشرة بدون شاشة تسجيل دخول ============== */
window.addEventListener('DOMContentLoaded', ()=>{
  const d = loadLocalData();
  state.user = { name:t('visitorName'), sub:t('visitorSub') };
  state.favorites = new Set(d.favorites);
  state.history = new Set(d.history);
  enterApp();
});

function enterApp(){
  Promise.all([loadBooks(), loadAdhkar(), loadRatings()]).then(()=>{ renderAll(); });
}

async function loadBooks(){
  const grid = document.getElementById('homeGrid');
  if(grid) grid.innerHTML = Array(6).fill('<div class="skeleton"></div>').join('');
  if(!CONFIGURED){ BOOKS = []; state.booksLoaded = true; return; }
  const { data, error } = await supabaseClient.from('books').select('*').order('created_at', { ascending:false });
  if(error){ BOOKS = []; }
  else {
    BOOKS = (data || []).map(row => ({
      id: row.id, cat: row.category,
      title: { ar:row.title_ar, en:row.title_en }, author: { ar:row.author_ar, en:row.author_en },
      desc: { ar:row.desc_ar, en:row.desc_en }, color: row.cover_color, pdfUrl: row.pdf_url, totalPages: row.total_pages,
    }));
  }
  state.booksLoaded = true;
}

async function loadAdhkar(){
  if(!CONFIGURED){ ADHKAR = []; return; }
  const { data, error } = await supabaseClient.from('adhkar').select('*').order('created_at', { ascending:false });
  ADHKAR = error ? [] : (data || []).map(row => ({ id: row.id, text: row.text_ar, source: row.source, ornament: row.ornament || 'hizb' }));
}
function ornamentBar(key){
  const map = {hizb:'۞', star8:'✦ ✧ ✦', floral:'❧ ❧ ❧', classic:'﴾ ﴿'};
  return map[key] || map.hizb;
}
function renderAdhkar(){
  const list = document.getElementById('adhkarList');
  if(!ADHKAR.length){
    list.innerHTML = `<div class="empty-state"><div class="ee-icon">📿</div><p><strong>${t('emptyAdhkar')}</strong></p></div>`; return;
  }
  list.innerHTML = ADHKAR.map(a=>`
    <div class="adhkar-card">
      <div class="orn-line">${ornamentBar(a.ornament)}</div>
      <p class="adhkar-text">${a.text||''}</p>
      ${a.source ? `<div class="adhkar-source">— ${a.source}</div>` : ''}
      <div class="orn-line bottom">${ornamentBar(a.ornament)}</div>
    </div>
  `).join('');
}

async function loadRatings(){
  if(!CONFIGURED){ RATINGS = []; return; }
  const { data, error } = await supabaseClient.from('book_ratings').select('book_id, rating');
  RATINGS = error ? [] : data || [];
}
function ratingStatsFor(bookId){
  const rows = RATINGS.filter(r=>String(r.book_id)===String(bookId));
  if(!rows.length) return { avg:0, count:0 };
  return { avg: rows.reduce((s,r)=>s+r.rating, 0)/rows.length, count: rows.length };
}

function setTheme(theme){ state.theme = theme; document.documentElement.setAttribute('data-theme', theme); }
function toggleLang(){
  state.lang = state.lang === 'ar' ? 'en' : 'ar';
  document.documentElement.lang = state.lang; document.documentElement.dir = state.lang === 'ar' ? 'rtl' : 'ltr';
  document.documentElement.setAttribute('data-lang', state.lang);
  document.getElementById('langBtn').textContent = state.lang === 'ar' ? 'EN' : 'AR';
  state.user = { name:t('visitorName'), sub:t('visitorSub') };
  renderAll();
}
function applyStaticTranslations(){
  document.querySelectorAll('[data-t]').forEach(el=>{ el.textContent = t(el.getAttribute('data-t')); });
  document.querySelectorAll('[data-t-ph]').forEach(el=>{ el.setAttribute('placeholder', t(el.getAttribute('data-t-ph'))); });
}

function switchTab(tab){
  state.activeTab = tab;
  document.getElementById('homeTab').hidden = tab !== 'home';
  document.getElementById('searchTab').hidden = tab !== 'search';
  document.getElementById('adhkarTab').hidden = tab !== 'adhkar';
  document.getElementById('navHome').classList.toggle('active', tab==='home');
  document.getElementById('navSearch').classList.toggle('active', tab==='search');
  document.getElementById('navAdhkar').classList.toggle('active', tab==='adhkar');
  if(tab==='search') renderSearch(); if(tab==='adhkar') renderAdhkar();
}

function renderHomeGrid(){
  const grid = document.getElementById('homeGrid');
  if(!BOOKS.length){ grid.innerHTML = emptyStateHtml(); return; }
  grid.innerHTML = BOOKS.slice(0, 8).map(bookCardHtml).join('');
}
function emptyStateHtml(){ return `<div class="empty-state"><div class="ee-icon">📭</div><p><strong>${t('emptyLibrary')}</strong></p></div>`; }

function renderCategoryChips(){
  const chips = CATEGORIES.map(c=>{
    return `<button class="chip ${state.selectedCategory === c.key?'active':''}" onclick="selectCategory('${c.key}')">${state.lang==='ar'?c.ar:c.en}</button>`;
  }).join('');
  document.getElementById('categoryChips').innerHTML = `<button class="chip ${state.selectedCategory===null?'active':''}" onclick="selectCategory(null)">${state.lang==='ar'?'الكل':'All'}</button>` + chips;
}
function selectCategory(key){ state.selectedCategory = key; renderCategoryChips(); renderSearch(); }
function renderSearch(){
  const query = (document.getElementById('searchInput')?.value || '').trim().toLowerCase();
  let results = BOOKS.filter(b=>{
    return (!state.selectedCategory || b.cat === state.selectedCategory) &&
           (!query || b.title.ar.toLowerCase().includes(query) || b.title.en.toLowerCase().includes(query));
  });
  const grid = document.getElementById('searchGrid');
  if(!BOOKS.length){ grid.innerHTML = emptyStateHtml(); return; }
  grid.innerHTML = results.length ? results.map(bookCardHtml).join('') : `<p class="drawer-empty">${t('noResults')}</p>`;
}

function bookCardHtml(b){
  const info = catInfo(b.cat);
  return `<div class="book-card" style="--cat-color:${b.color||info.color}" onclick="openBookModal('${b.id}')">
      ${state.favorites.has(b.id) ? '<span class="fav-mark">⭐</span>' : ''}
      <span class="book-tag">${state.lang==='ar'?info.ar:info.en}</span>
      <div class="book-title">${b.title[state.lang]}</div>
      <div class="book-author">${t('by')} ${b.author[state.lang]}</div>
    </div>`;
}

function openBookModal(id){
  const b = BOOKS.find(x=>String(x.id)===String(id)); if(!b) return;
  const info = catInfo(b.cat); const isFav = state.favorites.has(b.id); const isRead = state.history.has(b.id);
  const { avg, count } = ratingStatsFor(b.id);
  const starsHtml = [1,2,3,4,5].map(n=> `<span class="star ${n<=Math.round(avg)?'filled':''}">★</span>`).join('');
  document.getElementById('bookModal').innerHTML = `
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-cover" style="background:${b.color||info.color}">📕</div>
    <h3 class="display">${b.title[state.lang]}</h3>
    <p class="modal-author">${t('by')} ${b.author[state.lang]}</p>
    <p class="modal-desc">${b.desc[state.lang]||''}</p>
    <div class="rating-row">${starsHtml}<span class="rating-summary">${count ? avg.toFixed(1)+' ('+count+')' : ''}</span></div>
    <div class="modal-actions">
      <button class="btn primary" onclick="readBook('${b.id}')">${t('readBtn')}</button>
      <button class="btn ${isFav?'primary':''}" onclick="toggleFav('${b.id}')">${isFav?t('removeFav'):t('addFav')}</button>
      <button class="btn ${isRead?'primary':''}" onclick="toggleRead('${b.id}')">${isRead?t('markedRead'):t('markRead')}</button>
    </div>`;
  document.getElementById('modalOverlay').hidden = false;
}
function closeModal(){ document.getElementById('modalOverlay').hidden = true; }
function closeModalOnOverlay(e){ if(e.target.id==='modalOverlay') closeModal(); }

function toggleFav(id){
  const has = state.favorites.has(id);
  if(has){ state.favorites.delete(id); } else { state.favorites.add(id); }
  openBookModal(id); renderHomeGrid(); renderSearch(); renderDrawerList();
  const d = loadLocalData(); d.favorites = [...state.favorites]; saveLocalData(d);
}
function toggleRead(id){
  const has = state.history.has(id);
  if(has){ state.history.delete(id); } else { state.history.add(id); }
  openBookModal(id); renderDrawerList();
  const d = loadLocalData(); d.history = [...state.history]; saveLocalData(d);
}

/* =========================================================================
   القارئ: تحميل مسبق كامل (Blob) + تمرير عمودي متصل + تكبير حاد الوضوح + رسم وهايلايت
   كل تقدم القراءة والرسومات يُحفظ تلقائيًا على الجهاز بدون أي حساب
   ========================================================================= */
let pdfInstance = null;
if(typeof pdfjsLib !== 'undefined'){
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
}

let readerState = { zoom:1 };
let pdfPagesMeta = [];
let zoomRenderTimer = null;
let drawState = { mode:false, tool:'pen', color:'#e53e3e', size:4, drawing:false, lastX:0, lastY:0, activeCanvas:null };

async function readBook(id){
  const book = BOOKS.find(b=>String(b.id)===String(id));
  if(!book) return; if(!book.pdfUrl){ showToast(t('noPdfMsg')); return; }
  
  closeModal();
  state.currentPdfBookId = id;

  readerState.zoom = 1;
  drawState.mode = false; drawState.drawing = false; drawState.activeCanvas = null;
  document.getElementById('zoomLabel').textContent = '100%';
  document.getElementById('drawToolbar').hidden = true;
  document.getElementById('drawToggleBtn').classList.remove('active');
  
  const dlOverlay = document.getElementById('downloadOverlay');
  const dlProgress = document.getElementById('downloadProgress');
  const dlPercentage = document.getElementById('downloadPercentage');
  
  dlOverlay.hidden = false;
  dlProgress.style.width = '0%';
  dlPercentage.textContent = '0%';
  
  try {
    const response = await new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open('GET', book.pdfUrl, true);
      xhr.responseType = 'blob';
      
      xhr.onprogress = (event) => {
        if (event.lengthComputable) {
          const percentComplete = Math.round((event.loaded / event.total) * 100);
          dlProgress.style.width = percentComplete + '%';
          dlPercentage.textContent = percentComplete + '%';
        }
      };
      
      xhr.onload = () => {
        if (xhr.status === 200) resolve(xhr.response);
        else reject(new Error('فشل تحميل الملف من الخادم'));
      };
      xhr.onerror = () => reject(new Error('خطأ في الاتصال بالشبكة'));
      xhr.send();
    });

    const arrayBuffer = await response.arrayBuffer();
    
    document.getElementById('readerBookTitle').textContent = book.title[state.lang];
    const container = document.getElementById('readerPagesContainer');
    container.innerHTML = '';

    const wrap = document.getElementById('readerCanvasWrap');
    wrap.style.overflowX = 'hidden'; wrap.style.overflowY = 'auto';
    container.style.zoom = 1;
    
    pdfInstance = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    dlOverlay.hidden = true;
    document.getElementById('readerOverlay').hidden = false;
    
    document.getElementById('readerPageNum').textContent = t('loading');
    
    const totalPages = pdfInstance.numPages;
    const availableWidth = wrap.clientWidth - 20;
    const dpr = Math.min(window.devicePixelRatio || 1, 2.5);
    pdfPagesMeta = [];

    for (let i = 1; i <= totalPages; i++) {
      const pageContainer = document.createElement('div');
      pageContainer.className = 'page-container';
      pageContainer.dataset.page = i;
      
      const canvas = document.createElement('canvas');
      canvas.className = 'pdf-canvas';
      pageContainer.appendChild(canvas);

      const page = await pdfInstance.getPage(i);
      const unscaledViewport = page.getViewport({ scale: 1 });
      const baseScale = Math.min(2.0, availableWidth / unscaledViewport.width);
      const renderScale = baseScale * dpr;
      const viewport = page.getViewport({ scale: renderScale });
      
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      canvas.style.width = (baseScale * unscaledViewport.width) + 'px';
      canvas.style.height = (baseScale * unscaledViewport.height) + 'px';
      
      const ctx = canvas.getContext('2d');
      await page.render({ canvasContext: ctx, viewport: viewport }).promise;

      pdfPagesMeta.push({ pageNum:i, baseScale, unscaledWidth:unscaledViewport.width, unscaledHeight:unscaledViewport.height, canvasEl:canvas });

      const drawCanvas = document.createElement('canvas');
      drawCanvas.className = 'draw-canvas';
      drawCanvas.width = viewport.width;
      drawCanvas.height = viewport.height;
      pageContainer.appendChild(drawCanvas);
      attachDrawEvents(drawCanvas, id, i);

      const savedDrawing = getSavedDrawing(id, i);
      if(savedDrawing){
        const dImg = new Image();
        dImg.onload = ()=> drawCanvas.getContext('2d').drawImage(dImg, 0, 0, drawCanvas.width, drawCanvas.height);
        dImg.src = savedDrawing;
      }

      container.appendChild(pageContainer);
    }

    document.getElementById('readerPageNum').textContent = t('pageOf')(totalPages, totalPages);
    if(typeof confetti === 'function') confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
    
    if(CONFIGURED) supabaseClient.rpc('increment_book_views', { p_book_id: id }).then(()=>{});
    if(!state.history.has(id)){ toggleRead(id); }

    const d0 = loadLocalData();
    const savedPage = d0.positions[id];
    if(savedPage){
      const target = container.querySelector(`[data-page="${savedPage}"]`);
      if(target) setTimeout(()=> target.scrollIntoView(), 50);
    }

    wrap.onscroll = () => {
      const children = container.children;
      for (let child of children) {
        const rect = child.getBoundingClientRect();
        const inView = (rect.top >= 0 && rect.top <= window.innerHeight / 2);
        if (inView) {
          document.getElementById('readerPageNum').textContent = t('pageOf')(child.dataset.page, totalPages);
          clearTimeout(window._posSaveTimer);
          window._posSaveTimer = setTimeout(()=>{
            const d = loadLocalData();
            d.positions[id] = child.dataset.page;
            saveLocalData(d);
          }, 400);
          break;
        }
      }
    };

  } catch (error) {
    console.error(error);
    dlOverlay.hidden = true;
    showToast(t('pdfLoadError'));
  }
}

function closeReader(){
  document.getElementById('readerOverlay').hidden = true;
  pdfInstance = null;
  pdfPagesMeta = [];
}

/* ============== شريط سفلي: حفظ علامة / انتقال الى العلامة / الفهرس / بحث / الاضاءة ============== */
function currentVisiblePage(){
  const container = document.getElementById('readerPagesContainer');
  for (let child of container.children) {
    const rect = child.getBoundingClientRect();
    if (rect.top >= 0 && rect.top <= window.innerHeight / 2) return child.dataset.page;
  }
  return container.children[0] ? container.children[0].dataset.page : null;
}
function scrollToPage(pageNum){
  const container = document.getElementById('readerPagesContainer');
  const target = container.querySelector(`[data-page="${pageNum}"]`);
  if(target){ target.scrollIntoView({ behavior:'smooth' }); return true; }
  return false;
}
function saveBookmark(){
  if(!state.currentPdfBookId) return;
  const page = currentVisiblePage();
  if(!page) return;
  const d = loadLocalData();
  if(!d.bookmarks) d.bookmarks = {};
  d.bookmarks[state.currentPdfBookId] = page;
  saveLocalData(d);
  showToast(t('bookmarkSaved'));
}
function goToBookmark(){
  if(!state.currentPdfBookId) return;
  const d = loadLocalData();
  const page = d.bookmarks && d.bookmarks[state.currentPdfBookId];
  if(!page){ showToast(t('bookmarkNone')); return; }
  scrollToPage(page);
}
function openIndexPanel(){
  if(!pdfInstance) return;
  const grid = document.getElementById('indexGrid');
  const total = pdfInstance.numPages;
  let html = '';
  for(let i=1;i<=total;i++){ html += `<button class="index-page-btn" onclick="scrollToPage(${i}); closeIndexPanel();">${i}</button>`; }
  grid.innerHTML = html;
  document.getElementById('indexPanelOverlay').hidden = false;
  document.getElementById('indexPanel').hidden = false;
}
function closeIndexPanel(){
  document.getElementById('indexPanelOverlay').hidden = true;
  document.getElementById('indexPanel').hidden = true;
}
function openReaderSearchPanel(){
  document.getElementById('searchPanelOverlay').hidden = false;
  document.getElementById('searchPanel').hidden = false;
}
function closeReaderSearchPanel(){
  document.getElementById('searchPanelOverlay').hidden = true;
  document.getElementById('searchPanel').hidden = true;
}
function goToSearchedPage(){
  const val = parseInt(document.getElementById('readerSearchInput').value, 10);
  if(!val || !pdfInstance || val < 1 || val > pdfInstance.numPages){ showToast(t('pageNotFound')); return; }
  const ok = scrollToPage(val);
  if(ok) closeReaderSearchPanel(); else showToast(t('pageNotFound'));
}
function cycleReaderTheme(){
  const order = ['paper','sepia','night'];
  const next = order[(order.indexOf(state.theme) + 1) % order.length];
  setTheme(next);
  document.getElementById('themeSelect').value = next;
}

function zoomReader(delta){
  readerState.zoom = Math.min(3, Math.max(0.5, +(readerState.zoom + delta).toFixed(2)));
  document.getElementById('zoomLabel').textContent = Math.round(readerState.zoom * 100) + '%';
  clearTimeout(zoomRenderTimer);
  zoomRenderTimer = setTimeout(renderPagesAtCurrentZoom, 150);
}

async function renderPagesAtCurrentZoom(){
  if(!pdfInstance) return;
  const dpr = Math.min(window.devicePixelRatio || 1, 2.5);
  for(const meta of pdfPagesMeta){
    const page = await pdfInstance.getPage(meta.pageNum);
    const renderScale = meta.baseScale * readerState.zoom * dpr;
    const viewport = page.getViewport({ scale: renderScale });
    const canvas = meta.canvasEl;
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    canvas.style.width = (meta.baseScale * readerState.zoom * meta.unscaledWidth) + 'px';
    canvas.style.height = (meta.baseScale * readerState.zoom * meta.unscaledHeight) + 'px';
    const ctx = canvas.getContext('2d');
    await page.render({ canvasContext: ctx, viewport: viewport }).promise;
  }
}

function toggleDrawPanel(){
  drawState.mode = !drawState.mode;
  document.getElementById('drawToolbar').hidden = !drawState.mode;
  document.getElementById('drawToggleBtn').classList.toggle('active', drawState.mode);
  document.querySelectorAll('.draw-canvas').forEach(c=>{
    c.style.pointerEvents = drawState.mode ? 'auto' : 'none';
    c.style.touchAction = drawState.mode ? 'none' : 'auto';
  });
}
function setDrawTool(tool){
  drawState.tool = tool;
  document.getElementById('toolPenBtn').classList.toggle('active', tool==='pen');
  document.getElementById('toolHighlightBtn').classList.toggle('active', tool==='highlighter');
}
function setDrawColor(v){ drawState.color = v; }
function setDrawSize(v){ drawState.size = parseInt(v, 10); }

function getPointerPos(canvas, evt){
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  return { x: (evt.clientX - rect.left) * scaleX, y: (evt.clientY - rect.top) * scaleY };
}

function attachDrawEvents(canvas, bookId, pageNum){
  canvas.addEventListener('pointerdown', (e)=>{
    if(!drawState.mode) return;
    drawState.drawing = true; drawState.activeCanvas = canvas;
    try{ canvas.setPointerCapture(e.pointerId); }catch(err){}
    const pos = getPointerPos(canvas, e);
    drawState.lastX = pos.x; drawState.lastY = pos.y;
    const ctx = canvas.getContext('2d');
    ctx.lineJoin = 'round'; ctx.lineCap = 'round';
    if(drawState.tool === 'highlighter'){
      ctx.globalAlpha = 0.35; ctx.globalCompositeOperation = 'multiply'; ctx.lineWidth = drawState.size * 4;
    } else {
      ctx.globalAlpha = 1; ctx.globalCompositeOperation = 'source-over'; ctx.lineWidth = drawState.size;
    }
    ctx.strokeStyle = drawState.color;
    ctx.beginPath(); ctx.moveTo(pos.x, pos.y); ctx.lineTo(pos.x + 0.01, pos.y + 0.01); ctx.stroke();
  });
  canvas.addEventListener('pointermove', (e)=>{
    if(!drawState.mode || !drawState.drawing || drawState.activeCanvas !== canvas) return;
    const pos = getPointerPos(canvas, e);
    const ctx = canvas.getContext('2d');
    ctx.lineJoin = 'round'; ctx.lineCap = 'round';
    if(drawState.tool === 'highlighter'){
      ctx.globalAlpha = 0.35; ctx.globalCompositeOperation = 'multiply'; ctx.lineWidth = drawState.size * 4;
    } else {
      ctx.globalAlpha = 1; ctx.globalCompositeOperation = 'source-over'; ctx.lineWidth = drawState.size;
    }
    ctx.strokeStyle = drawState.color;
    ctx.beginPath(); ctx.moveTo(drawState.lastX, drawState.lastY); ctx.lineTo(pos.x, pos.y); ctx.stroke();
    drawState.lastX = pos.x; drawState.lastY = pos.y;
  });
  const endDraw = ()=>{
    drawState.drawing = false; drawState.activeCanvas = null;
    if(bookId){ saveDrawingForPage(bookId, pageNum, canvas); }
  };
  canvas.addEventListener('pointerup', endDraw);
  canvas.addEventListener('pointercancel', endDraw);
  canvas.addEventListener('pointerleave', endDraw);
}

function clearAllDrawings(){
  document.querySelectorAll('.draw-canvas').forEach(c=>{
    c.getContext('2d').clearRect(0, 0, c.width, c.height);
  });
  if(state.currentPdfBookId){
    const d = loadLocalData();
    delete d.drawings[state.currentPdfBookId];
    saveLocalData(d);
  }
}

function showToast(msg){
  const el = document.getElementById('toast'); el.textContent = msg; el.classList.add('show');
  clearTimeout(window._toastTimer); window._toastTimer = setTimeout(()=> el.classList.remove('show'), 1800);
}

function openDrawer(){
  document.getElementById('drawerOverlay').hidden = false; document.getElementById('profileDrawer').hidden = false;
  document.getElementById('drawerName').textContent = state.user.name; document.getElementById('drawerSub').textContent = state.user.sub;
  renderDrawerList();
}
function closeDrawer(){ document.getElementById('drawerOverlay').hidden = true; document.getElementById('profileDrawer').hidden = true; }
function switchDrawerTab(tab){ state.drawerTab = tab; renderDrawerList(); }
function renderDrawerList(){
  const container = document.getElementById('drawerListContainer');
  const ids = state.drawerTab === 'fav' ? [...state.favorites] : [...state.history];
  if(!ids.length){ container.innerHTML = `<div class="drawer-empty">فارغة حالياً</div>`; return; }
  container.innerHTML = ids.map(id=>{
    const b = BOOKS.find(x=>String(x.id)===String(id)); return b ? `<div class="drawer-list-item"><span>${b.title[state.lang]}</span></div>` : '';
  }).join('');
}

function renderAll(){ applyStaticTranslations(); renderHomeGrid(); renderCategoryChips(); renderSearch(); }
